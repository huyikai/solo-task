<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>solo-task</title>
    <script>
      (function () {
        var K = 'solo-task-theme'
        var p = 'light'
        try {
          p = localStorage.getItem(K) || 'light'
        } catch (e) {}
        var sysDark = false
        try {
          sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        } catch (e) {}
        var dark = p === 'dark' || (p === 'system' && sysDark)
        document.documentElement.dataset.theme = dark ? 'dark' : 'light'
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
